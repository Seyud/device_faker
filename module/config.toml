# ============================================================
# 配置说明
# ============================================================
#
# 【配置方式】
# 1. 模板包名列表 - 在模板的 packages 中直接添加包名
# 2. 直接配置 - 使用 [[apps]] 直接指定设备信息
#
# 【优先级】
# 字段优先级：[[apps]] 直接配置 > 模板 packages 列表
# 模式优先级：[[apps]].mode > [templates].mode > 全局 default_mode
#
# 【模板可以设置模式】⭐
# 模板支持设置 mode 字段：
#   [templates.xxx]
#   packages = ["com.app1", "com.app2"]
#   mode = "full"  # 这个模板的所有应用都使用 full 模式
#
# 如果不设置，使用全局 default_mode
# 如果需要覆盖，在 [[apps]] 中单独设置
#
# 【字段生效范围】⚠️
# lite 模式（默认）：
#   ✅ manufacturer, brand, model, device, product, fingerprint, build_id
#   ❌ name, marketname, characteristics（full/companion 模式生效）
#
# full 模式：
#   ✅ 所有字段都生效
#   ⭐ name 字段会同时伪装 ro.product.name 和 ro.product.device
#   ⭐ characteristics 在 native 层伪装
#
# companion 模式：
#   ✅ Build 字段和系统属性都生效，可选伪装 /proc/cpuinfo
#   ⭐ 完成后卸载模块，属性恢复和 CPU 清理由 companion 负责
#
# 【模式说明】
#
# ┌──────────┬────────────┬──────────────┬────────────┬──────────────┐
# │   模式   │  Build类   │ Properties   │  可卸载    │   隐蔽性     │
# ├──────────┼────────────┼──────────────┼────────────┼──────────────┤
# │  lite ⭐ │     ✅     │      ❌      │     ✅     │  ⭐⭐⭐⭐⭐  │
# │  full    │     ✅     │      ✅      │     ❌     │  ⭐⭐⭐⭐      │
# │ companion│     ✅     │      ✅      │     ✅     │  ⭐⭐⭐⭐      │
# └──────────┴────────────┴──────────────┴────────────┴──────────────┘
#
# 【lite 模式】（默认，推荐）⭐
# - 只修改 android.os.Build 类的静态字段
# - 完成后立即卸载模块，模块不驻留内存
# - ✅ 优点：隐蔽性极高，不易被检测
# - ✅ 优点：对 95% 的应用来说，伪装 Build 类已经足够
# - ⚠️ 缺点：无法伪装 SystemProperties（极少数应用会检查）
# - 适用场景：默认选择，适合大多数应用
#
# 【full 模式】（按需使用）
# - 修改 Build 类 + 伪装 SystemProperties.native_get
# - 模块保持加载状态，驻留内存
# - ✅ 优点：完整伪装，拦截所有属性查询（包括 native 层）
# - ⚠️ 缺点：模块驻留内存，可能被某些应用检测到
# - 适用场景：需要完全伪装 SystemProperties 的特殊应用
#
# 【companion 模式】
# - 使用 companion 进程修改系统属性，并在配置 CPU 预设时伪装 /proc/cpuinfo
# - 完成后立即卸载模块，属性恢复和 CPU 挂载清理由 companion 负责
# - ✅ 优点：可以修改只读属性，并支持 CPU 信息伪装
#
# 推荐策略：
# 1. 默认所有应用使用 lite 模式（不设置 mode 字段）
# 2. 只有当某个应用在 lite 模式下仍能检测到真实机型时，才为其单独设置 mode = "full"
# 3. 需要 resetprop 属性伪装或 CPU 伪装的应用使用 companion 模式
